<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laexis Advisory - Introduction</title>
<style>
body{
  font-family: "Helvetica Neue", Arial, sans-serif;
  background:#f7f9fb;
  margin:0;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  color:#333;
  text-align:center;
}
.container{
  max-width:600px;
}
h2{
  color:#0f2747;
  font-size:28px;
  margin-bottom:10px;
}
.subtitle{
  color:#555;
  font-size:16px;
  margin-bottom:40px;
}
.lang-buttons{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}
.lang-btn{
  display:inline-block;
  padding:14px 32px;
  background:#0f2747;
  color:white;
  text-decoration:none;
  border-radius:4px;
  font-size:16px;
  transition:background 0.2s;
  min-width:140px;
}
.lang-btn:hover{
  background:#1b3f6e;
}
.lang-btn .label{
  font-size:12px;
  opacity:0.75;
  display:block;
  margin-top:4px;
}
.back{
  margin-top:40px;
  display:block;
  font-size:14px;
  color:#888;
  text-decoration:none;
}
.back:hover{ color:#0f2747; }
</style>
</head>
<body>
<div class="container">
  <h2>Welcome to Laexis Advisory</h2>
  <p class="subtitle">Please select your language / 请选择语言 / 言語を選択してください</p>

  <div class="lang-buttons">
    <a class="lang-btn" href="/Services/CN">
      中文
      <span class="label">Chinese</span>
    </a>
    <a class="lang-btn" href="/Services/EN">
      English
      <span class="label">English</span>
    </a>
    <a class="lang-btn" href="/Services/JP">
      日本語
      <span class="label">Japanese</span>
    </a>
  </div>

  <a class="back" href="/">← Back</a>
</div>
</body>
</html>
